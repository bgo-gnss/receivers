# Station Area Configuration
# Defines geographic and volcanic monitoring areas for GPS stations
# Stations can belong to multiple areas (overlap allowed)
#
# Originally generated from station coordinates in the database; hand-maintained
# since. Volcanic areas use radius from center point. Regional areas use
# bounding boxes. Keep the structure regular — a future generator script must be
# able to rewrite whole sections without breaking hand-edited content.
#
# Per-area keys:
#   name        Display name (English)          — required
#   name_is     Display name (Icelandic)        — optional
#   description Free-text description           — optional
#   cdn         Slug of this area's plot dir on the CDN (brunnur). Absent key
#               means no CDN counterpart: consumers fall back to the standard
#               plot location.                  — optional
#   stations    Member station markers          — required
#   geometry, analyses — RESERVED for the shapefile/area-analyses phase; do not
#               use yet.
#
# Top-level keys:
#   category_labels  Display labels for the area categories (a category is a
#                    "<category>_areas" section); consumers fall back to the
#                    raw category key when unlabeled.
#   <category>_areas Area definitions, one mapping per category.
#
# Usage: seeded into the station_areas DB table by receivers (Grafana area
# filtering); region source for the aflogun_tmp GNSS browser via
# [PATHS] station_areas_file in postprocess.cfg

category_labels:
  volcanic: "Eldstöðvakerfi"
  regional: "Landshlutar"
  seismic: "Skjálftabelti"
  monitoring: "Skriðu- og flóðavöktun"

