# =============================================================================
# NOTES
# =============================================================================
#
# Volcanic area assignments based on distance from volcanic center:
#   - Svartsengi: 8km radius from Þorbjörn
#   - Krýsuvík: 10km radius
#   - Hengill: 12km radius
#   - Other volcanic systems: 12-30km depending on size
#
# Regional areas use geographic bounding boxes.
# Stations may appear in multiple areas where coverage overlaps.
#
# To update: edit by hand (the analyze_station_areas.py generator referenced
# here previously no longer exists; a criteria-driven generator is planned).

