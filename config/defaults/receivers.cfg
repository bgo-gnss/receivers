# =============================================================================
# GPS Receivers — Default Configuration
# =============================================================================
# This file ships with the receivers package and provides sane defaults.
# Institution-specific config should live in gps-config-data and be deployed
# to ~/.config/gpsconfig/receivers.cfg (or $GPS_CONFIG_PATH/receivers.cfg).
#
# The install script copies from gps-config-data and patches paths for the
# target environment. This file is the fallback if gps-config-data is not
# available.
# =============================================================================

[archive_paths]
archive_template = {data_prepath}/%%Y/#b/{station}/{session}/raw/{station}%%Y%%m%%d%%H00{session_letter}{extension}
data_prepath = /mnt/data/gpsdata/
tmp_dir = /tmp/gps_receivers/download/
# Read-only base path to the long-term raw/RINEX archive (cold storage).
# Distinct from data_prepath (the online working cache that receivers writes
# to). Consumed by tostools — and eventually by receivers itself — for
# historical lookups (e.g. RINEX-header-based device-history reconstruction).
# Production: /mnt/rawgpsdata  Laptop dev: /mnt_data/rawgpsdata
cold_archive_prepath = /mnt/rawgpsdata/

[paths]
# Local clone of the gps-config-data git repo (the source of truth). Used by
# `receivers cfg ... --global` to write + commit stations.cfg back to the repo.
# Resolution precedence: explicit flag → $GPS_CONFIG_DATA_REPO → this value →
# the built-in default (~/git/gps-config-data). Same path on laptop and server.
gps_config_data_repo = ~/git/gps-config-data

[session_types]
15s_24hr = 1D,15s,Daily 15-second data,24hr
1hz_1hr = 1H,1Hz,Hourly 1Hz data,1hr
status_1hr = 1H,status,Hourly status data,1hr

[receiver_defaults]
immediate_archive = true
clean_tmp = false
compression = .gz
connection_timeout = 20
inactivity_timeout = 20
progress_timeout = 300
stall_timeout = 300

[polarx5]
vendor = Septentrio
model = PolaRx5
base_path = /DSK1/SSN/
file_extension = .sbf.gz
control_port = 28784
stall_timeout = 600
session_map_15s_24hr = a,LOG1_15s_24hr
session_map_1hz_1hr = b,LOG2_1Hz_1hr
session_map_status_1hr = c,LOG5_status_1hr
ftp_passive = true
ftp_anonymous_login = false
# TCP authentication (required for fw 5.7.0+; older firmware returns $E: Invalid command! which is tolerated)
# Set in the deployed receivers.cfg — do NOT commit real credentials here.
# tcp_username = <your_username>
# tcp_password = <your_password>
# SSH private key for passwordless SFTP/rsync (optional — uncomment when deployed)
# tcp_ssh_key_path = /home/gpsops/.ssh/polarx5_gpsops
#
# Factory bootstrap credentials (Septentrio-wide defaults, documented in Reference Guide § 3.5)
# Used by rec-provision to create User1 on factory-fresh receivers with no accounts.
# Change only if your fleet was shipped with non-standard factory credentials.
# factory_username = RxAdmin
# factory_password = S3pt3ntr10
#
# Admin account (User2) created/updated on every rec-provision run.
# admin_username = <your_admin_username>
# admin_password = <your_admin_password>
#
# Static IP defaults for desk/bench setup (rec-provision --set-ip).
# Used when --gateway / --netmask / --dns1 / --dns2 are not given on the CLI.
# desk_gateway = <gateway_ip>
# desk_netmask = <netmask>
# desk_dns1 = <dns1_ip>
# desk_dns2 = <dns2_ip>

[netr5]
vendor = Trimble
model = NetR5
base_path = /Internal/
file_extension = .T02
protocol = http
session_map_15s_24hr = a,15s_24hr
session_map_1hz_1hr = b,1Hz_1hr
http_port = 80
http_timeout_connect = 60
http_stall_timeout = 180
remote_date_format = %%Y%%m
remote_filename_format = {station}%%Y%%m%%d%%H%%M{session_letter}.T02
compression =

[netr9]
vendor = Trimble
model = NetR9
base_path = /Internal/
file_extension = .T02
protocol = http
session_map_15s_24hr = a,15s_24hr
session_map_1hz_1hr = b,1Hz_1hr
http_port = 8060
http_timeout_connect = 60
http_stall_timeout = 180
stall_timeout = 180
remote_date_format = %%Y%%m
remote_filename_format = {station}%%Y%%m%%d%%H%%M{session_letter}.T02
compression =

[netrs]
vendor = Trimble
model = NetRS
base_path = /download/
file_extension = .T00
protocol = http
session_map_15s_24hr = a,a
session_map_1hz_1hr = b,b
http_port = 8060
http_timeout_connect = 60
http_stall_timeout = 180
stall_timeout = 180
remote_date_format = %%Y%%m
remote_filename_format = {station}%%Y%%m%%d%%H%%M{session_letter}.T00
compression =

[g10]
vendor = Leica
model = GR10
base_path = /SD Card/Data/
file_extension = .m00
protocol = ftp
session_map_15s_24hr = a,15s_24hr
session_map_1hz_1hr = b,1s_1hr
ftp_port = 2160
ftp_anonymous_login = true
ftp_passive = false
ftp_timeout_connect = 90
ftp_timeout_data = 600
stall_timeout = 600
remote_date_format = %%j
remote_filename_format = {station}{doy}a.m00.zip
archive_filename_format = {station}%%Y%%m%%d%%H%%M0000{session_letter}.m00
compression = .gz
process_zip_files = true
unzip_command = unzip

[validation]
check_file_integrity = true
minimum_file_size = 1024
maximum_age_days = 30
verify_gps_time = true

[processing]
timeseries_prepath = /mnt/data/gpsdata
processing_24hr_expected_by = 6

[rinex]
default_version = 3
default_naming = short
default_hatanaka = true
default_compression = Z
apply_header_corrections = true
use_tos_for_historical = true
recent_days_threshold = 30
use_native_trimble = true

# NOTE: No [rinex_tools] section — tools are found via PATH lookup.
# Install tools to /usr/local/bin/ or ensure they're on PATH.
# See: get_tool_path() in converter_base.py

# ---------------------------------------------------------------------------
# Stream capture (RTCM3 -> BNC -> RINEX). Opt-in second acquisition mode for
# low-bandwidth stations; select per-station with `acquisition_mode = stream`
# in stations.cfg. Read by receivers.scheduling.stream_scheduler.
# The scheduler job is gated by scheduler.yaml `stream_capture.enabled` (default
# off) — this section only supplies stream-specific paths/tools/policy.
#
# The NTRIP caster connection (host/port/username/password/mountpoint_suffix) is
# SHARED with the RTK stream-status checks and read from [ntrip_defaults] below —
# it is NOT duplicated here. Add a caster_* key here only to override [ntrip_defaults]
# for stream capture specifically.
# ---------------------------------------------------------------------------
[streaming]
# bnc_path        = /usr/local/bin/bnc      # default: bnc on PATH (Phase 8 symlink)
# bnc_config_dir  = ~/.config/BKG           # where rtcm2rinex-<SID>.bnc are written
# stream_tmp      = ~/.cache/gps_receivers/tmp   # base for rt_base + downsample workdir
# rt_base         = <stream_tmp>/RT-rinex   # BNC RINEX output root (<rt_base>/<SID>/)
# crx2rnx         = CRX2RNX                 # Hatanaka tools (default: PATH)
# rnx2crx         = RNX2CRX
# teqc            = teqc
# interval        = 15                      # downsample target interval (seconds)
# min_missing_to_fill = 2                   # gap hours that trigger a file download
# recent_grace_hours  = 2                   # don't treat the last N hours as gaps
# caster_* / mountpoint_suffix              # optional overrides of [ntrip_defaults]
