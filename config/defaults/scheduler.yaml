# =============================================================================
# GPS Receiver Scheduler — Default Configuration
# =============================================================================
# Institution-specific config should live in gps-config-data and be deployed
# to ~/.config/gpsconfig/scheduler.yaml (or $GPS_CONFIG_PATH/scheduler.yaml).
# =============================================================================

scheduler:
  database: ~/.cache/gps_receivers/scheduler.db
  max_workers: 200
  log_dir: ~/.cache/gps_receivers/logs
  log_level: INFO
  job_defaults:
    coalesce: true
    max_instances: 1
    misfire_grace_time: 600

# ==============================================================================
# DOWNLOAD SESSIONS
# ==============================================================================
sessions:
  15s_24hr:
    enabled: true
    schedule: "00:01"
    distribution_window: 5
    batches: 2
    days_back: 1
    archiving_mode: immediate
    rinex: true

  1Hz_1hr:
    enabled: true
    schedule: ":01"             # standard hourly window (hh:01)
    midnight_offset: 10         # at hour 0, start at 00:11 to clear 15s_24hr's :01-:06 window
    distribution_window: 5      # files are small, 5min spread is plenty
    lookback_periods: 1         # last hour only to start; bump later for backfill
    archiving_mode: immediate
    rinex: true

  status_1hr:
    enabled: true
    schedule: ":15"
    distribution_window: 5
    lookback_periods: 1
    archiving_mode: immediate

# ==============================================================================
# HEALTH MONITORING
# ==============================================================================
status_monitoring:
  enabled: true
  schedule: "5m"
  distribution_window: 3
  targets: [database, icinga]

# ==============================================================================
# MAINTENANCE JOBS
# ==============================================================================
archive_reconciler:
  enabled: true
  schedule: ":30"
  days_back: 3
  sessions:
    - 15s_24hr
    - 1Hz_1hr

gap_detection:
  enabled: true
  schedule: "2h"
  days_back: 7
  sessions:
    - 15s_24hr
    - status_1hr

backfill:
  enabled: false

integrity_checker:
  enabled: true
  schedule: "6h"
  days_back: 7
  sessions: [15s_24hr, status_1hr]
  check_receiver: true
  size_tolerance_pct: 50.0

# Receiver horizon probe (unified file index slice-2b.3). Lists each receiver's
# date-directory index once per run to find the OLDEST file it still holds and
# records it in receiver_horizon — the dynamic fetch floor for
# missing_on_receiver, replacing the conservative static receiver_buffer_depth
# seed (a deep-buffer station expects older files back to the real horizon; a
# shallow-buffer station stops churning 404s on data it already rotated out).
# Disabled by default; the differential falls back to the static floor until
# this is enabled. NetRS has no directory-listing API and safely keeps the
# static floor. Runs on the backfill executor. `sessions` restricts which
# sessions to probe (default: the receiver's seeded sessions).
receiver_horizon_probe:
  enabled: false
  schedule: "04:40"
  # sessions: [15s_24hr, 1Hz_1hr]

# Morning recovery — daily catch-up for stations whose previous-day(s) file is
# still missing after the primary 00:01 window and 00:36 second-chance retry.
# Targets PolaRX5 receivers that need 30-90 min after midnight before reliably
# serving the daily 24h file via FTP, plus stations recovering from multi-day
# router/network outages.
#
# With days_back > 1, iterates target dates most-recent-first. A built-in
# deadline guard (_DEADLINE_HOUR_UTC = 3) stops the loop if it would otherwise
# run into downstream GAMIT processing (typically 03:00-04:00 UTC).
#
# See docs/design/morning-recovery.md for the full design.
morning_recovery:
  enabled: true
  # `schedule` accepts either a single string (legacy) or a list of strings
  # for multi-fire. Each list entry is independently parsed and can be any
  # supported format — daily time ("01:30"), interval ("6h"), or full cron
  # ("cron: 30 1,6 * * *").
  #
  # The 01:30 fire is gated by _DEADLINE_HOUR_UTC=3 in morning_recovery.py
  # (stops iterating new dates ~02:45 to protect GAMIT). The 03:30 and 05:30
  # fires run with a fresh ~24h budget (deadline rolls to next day) and pick
  # up dates that the prior fire deferred.
  schedule:
    - "01:30"                  # pre-GAMIT sweep
    - "03:30"                  # picks up what 01:30 deferred
    - "05:30"                  # final morning catch-up
  sessions:
    - 15s_24hr
  days_back: 7                 # Cover up to 7-day outages (was 3)
  max_workers: 4               # Parallel station downloads
  station_timeout_minutes: 8   # Hard ceiling per station
  bypass_known_missing: false  # Trust file_tracking 'missing' state (see is_file_missing TTL)

bootstrap:
  enabled: false

recovery:
  auto_recovery_enabled: false

stations: {}
