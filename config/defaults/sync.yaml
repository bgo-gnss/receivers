# Archive sync / dissemination configuration
# Location: ~/.config/gpsconfig/sync.yaml  (or $GPS_CONFIG_PATH/sync.yaml)
#
# Declarative targets for `receivers archive-sync`. The first target feeds the
# IMO long-term archive through the single write gateway (rawdata -> ananas).
# Dissemination targets (EPOS, etc.) are added later as tier: dissemination and
# stay inactive until the provenance engine (#34) lands.
# Design: 1781867391-data-dissemination-archive-sync-design.

# Default re-scan window below each target's watermark (guards the mtime-boundary
# / clock-skew race). Per-target `overlap_minutes` overrides this.
overlap_minutes: 5

targets:
  # --- IMO long-term archive (rawdata gateway -> ananas) -------------------
  - name: imo_archive
    # MASTER SWITCH. Keep false until the legacy `:45` rsync cron is stopped;
    # flip to true at the atomic cutover (the legacy and rek_new feeds must
    # never both push at once).
    active: false
    tier: archive                 # authoritative, audited, NO format conversion

    host: rawdata.vedur.is
    user: gpsops
    dest: ~/gpsdata               # = a disk ON ananas; the sole archive writer

    source_root: /mnt/data/gpsdata # rek_new local collection root

    sessions: [15s_24hr, 1Hz_1hr, status_1hr]
    # Tiers to push, each with its own archive write policy (engine.IMMUTABILITY):
    #   raw   -> --ignore-existing (permanent record, never overwritten)
    #   rinex -> --update          (regenerable; newer local copy may replace)
    file_categories: [raw, rinex]

    # Aliases are global-namespace renames, NOT stations — they must not pollute
    # the long-term archive (handled later in the dissemination layer instead).
    exclude_stations: [DYNA, HRNC, HAUR]

    # Watermark floor. Files older than this never enter the delta, so legacy-era
    # files are never re-pushed. Set to the actual cutover instant before going
    # live. (Placeholder — confirm the real Monday cutover timestamp.)
    cutover: "2026-06-22T00:00:00"

    # overlap_minutes: 5          # optional per-target override

  # --- EPOS dissemination (rawdata/ananas -> EPOS files server) ------------
  # Reads the long-term archive (short-named throughout: RINEX2 before the
  # 2026-06-22 cutover, RINEX3 after) and ships a per-version product: R3 content
  # -> long .crx.gz, R2 content -> short .YYd.Z (version detected from CONTENT, not
  # the always-short filename). Indexes into the EPOS gnss-europe DB. Keep inactive
  # until the EPOS server + [epos_db] are wired and parity-verified; run with
  # `--force --dest-override <dir>` to pre-stage. Design:
  # docs/architecture/epos-dissemination-plan.md
  - name: epos
    active: false
    tier: dissemination           # derived, regenerable, format-converted

    # EPOS files server (CONFIRM host/path + secret model before activating).
    host: epos-portal.vedur.is
    user: epos
    dest: /mnt/epos_01/gps

    # The ananas long-term archive, read-only mount on rek-d01 (CONFIRM mount).
    source_root: /mnt_data/rawgpsdata
    sessions: [15s_24hr]          # phase 1: 15s_24hr only (per-session format later)
    exclude_stations: [DYNA, HRNC, HAUR]
    # Rollout allowlist: the automated sweep disseminates ONLY these markers
    # (still intersected with the in_epos TOS set, minus exclude_stations). Empty
    # or absent = all in_epos stations. Onboard EPOS one station at a time by
    # listing them here, e.g. [RHOF], then grow to [RHOF, FIHO, ...] until every
    # in_epos station is syncing, then clear it. The explicit `epos-disseminate
    # --station X` path ignores this list.
    stations: []

    # Converted-output cache, keyed on hash(source content_sha256 + TOS fingerprint)
    convert_cache_dir: ~/.cache/gps_receivers/epos_convert

    # --- Format policy (the source of truth for naming/compression/layout) ---
    format:
      # Model B: ship the source's RINEX version UNCHANGED (never R2<->R3); each
      # version gets its own naming + packaging. EPOS accepts both.
      preserve_source_version: true
      country_code: ISL
      set_header_from_tos: true   # rewrite the header from TOS before push

      rinex2:                     # RINEX2 sources -> short names
        naming: short             # SSSS0DDF.YYt
        hatanaka: true            # -> .YYd
        compression: Z            # -> SSSS0DDF.YYd.Z  (legacy convention; needs `compress`)
      rinex3:                     # RINEX3 sources (incl. raw -> R3) -> long names
        naming: long              # SSSS00CCC_R_..._MO
        hatanaka: true            # -> .crx
        compression: gz           # -> ..._MO.crx.gz

      # Dest layout (gtimes datepathlist tokens + {station}; mirrors the legacy
      # archive tree). %Y=year, #b=lowercase 3-letter month.
      dir_template:      "%Y/#b/{station}/15s_24hr/rinex/"
      filename_template: "{name}"

      # --- Naming / header policy knobs (C4/C5; do NOT hardcode in code) -------
      # Optional on-the-fly decimation to this sampling interval (s) before
      # packaging — e.g. 30 for the conventional EPOS 30s daily product. Unset
      # (null) ships the source rate unchanged; phase 1 keeps 15s (EPOS accepts
      # it). Dissemination-boundary only; never touches the archive.
      sample:            null
      file_period:       "01D"      # RINEX3 long-name file-period token (daily)
      # 2-digit monument number in the 9-char id (RHOF`00`ISL), used for both the
      # long filename AND the MARKER NAME header so they never diverge. Config for
      # now; becomes a per-station TOS attribute later.
      monument_number:   "00"
      # OBSERVER / AGENCY written into disseminated headers (EPOS 4.1.7 wants a
      # generic team name, not personal initials).
      observer:          "GNSSatIMO"
      agency:            "Vedurstofa Islands"
