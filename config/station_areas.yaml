# Station Area Configuration
# Defines geographic and volcanic monitoring areas for GPS stations
# Stations can belong to multiple areas (overlap allowed)
#
# Area types:
#   - volcanic: Volcanic system monitoring networks
#   - regional: Geographic regions
#
# Usage: Used by Grafana dashboard for filtering voltage/health plots by area

# =============================================================================
# VOLCANIC MONITORING AREAS
# =============================================================================

volcanic_areas:
  svartsengi:
    name: "Svartsengi"
    description: "Svartsengi/Sundhnúkur volcanic system"
    stations:
      - GRIV   # Grindavík
      - GRVM   # Grindavík miðja
      - GRVV   # Grindavík vestur
      - THOB   # Þorbjörn
      - THNA   # ÞorbjörnNA
      - THOC   # Þorvaldshraun
      - SUND   # Suðurstrandavegur
      - BLAL   # Bláa Lónið
      - NBIO   # Blá Lónið Norður
      - VOGC   # Vogar
      - VOGS   # Vogsósar
      - HAFC   # Hafnir
      - FEFC   # Festarfjall
      - GONH   # Gónhóll við Geldingadali

  hengill:
    name: "Hengill"
    description: "Hengill volcanic system"
    stations:
      - HVER   # Hveragerði
      - HVEH   # Hverahlíð
      - KLVC   # Kleifarvatn
      - HELF   # Helgafell
      - NVEL   # Nesjavellir

  hekla:
    name: "Hekla"
    description: "Hekla volcanic system"
    stations:
      - HESA   # Hestalda
      - FJOC   # Fjórðungsalda
      - BALD   # Búrfellsalda
      - BUDH   # Búðarháls
      - FEDG   # Feðgar
      - NAMC   # Náma við Stapafell
      - ISAK   # Ísakot

  katla:
    name: "Katla"
    description: "Katla volcanic system (Mýrdalsjökull)"
    stations:
      - GOLA   # Goðaland við Mýrdalsjökul
      - ENTC   # Enta
      - HVOL   # Láguhvolar
      - HRSC   # Hrafntinnusker
      - AUST   # Austmannsbunga
      - SOHO   # Sólheimaheiði

  eyjafjallajokull:
    name: "Eyjafjallajökull"
    description: "Eyjafjallajökull volcanic system"
    stations:
      - FIM2   # Fimmvörðuháls
      - THEY   # Þorvaldseyri
      - GOLA   # Goðaland (shared with Katla)

  torfajokull:
    name: "Torfajökull"
    description: "Torfajökull volcanic system"
    stations:
      - LAHC   # Landmannalaugar
      - ALHV   # Álftavatnsheidi
      - HRSC   # Hrafntinnusker (shared)

  grimsvotn:
    name: "Grímsvötn"
    description: "Grímsvötn volcanic system"
    stations:
      - GFUM   # Grímsfjall
      - GRFS   # Grænufjöll
      - HAFS   # Hamarinn
      - JOKU   # Jökulheimar
      - SKHA   # Skaftafell (reference)

  bardarbunga:
    name: "Bárðarbunga"
    description: "Bárðarbunga volcanic system (Holuhraun)"
    stations:
      - DYNA   # Dyngja
      - DYNC   # Dyngjuháls
      - DYNG   # Dyngja
      - DYNY   # Dyngjufjöll ytri
      - KISA   # Kista í Bárðarbungu
      - VONC   # Vonarskard

  oraefajokull:
    name: "Öræfajökull"
    description: "Öræfajökull volcanic system"
    stations:
      - KVSK   # Kvísker
      - SVIE   # Svínafellsheiði Efri
      - SVIN   # Svínafellsheiði Neðri
      - SKHA   # Skaftafell
      - GFEL   # Geitafell

  askja:
    name: "Askja"
    description: "Askja volcanic system"
    stations:
      - DYNY   # Dyngjufjöll ytri (shared)
      - OLAC   # Ólafsgígar
      - INSK   # Innri Skúti

  krafla:
    name: "Krafla"
    description: "Krafla volcanic system"
    stations:
      - HLFJ   # Hlíðarfjall
      - KRAC   # Krafla
      - MYVA   # Mývatn
      - NAMC   # Náma
      - KRIV   # Krísuvík area stations

