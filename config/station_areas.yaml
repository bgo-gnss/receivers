# =============================================================================
# NOTES
# =============================================================================
#
# To add a station to an area, simply add its 4-letter ID to the stations list.
# Stations can appear in multiple areas (volcanic + regional, or overlapping volcanic systems).
#
# For Grafana integration:
# - This file is read to populate dropdown variables
# - SQL queries filter by station lists from selected areas
#
# Map view coordinates are stored in stations.cfg or the database (lat/lon fields)
