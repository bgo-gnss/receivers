version: '3.8'

services:
  gps-scheduler:
    build:
      context: ../..
      dockerfile: deployment/docker-dev/Dockerfile
    image: gps-receivers-dev:latest
    container_name: gps-receivers-scheduler-dev
    hostname: gps-scheduler-dev
    restart: unless-stopped

    # Network mode - use host for IMO internal network access
    network_mode: host

    # DNS configuration - use internal DNS servers for *.gps.vedur.is resolution
    dns:
      - 10.170.255.210
      - 10.170.255.220
      - 8.8.8.8
      - 1.1.1.1
    dns_search:
      - vedur.is
      - dyn.vedur.is
      - vi.vedur.is

    # Environment variables
    environment:
      - GPS_CONFIG_REPO_URL=https://git.vedur.is/bgo/gps-config-data.git
      - GPS_ENVIRONMENT=production
      - GPS_CONFIG_PATH=/opt/gps-config-data
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - TZ=Atlantic/Reykjavik

    # Volumes - mount local packages for live code updates
    volumes:
      # Data directory (GPS files) - bind to host
      - gps-data:/mnt/gpsdata

      # Cache and logs - bind to host
      - gps-cache:/var/cache/gps_receivers

      # Mount receivers source files (not /opt/receivers to preserve scripts)
      - ../../src:/opt/receivers/src:ro
      - ../../pyproject.toml:/opt/receivers/pyproject.toml:ro
      - ../../README.md:/opt/receivers/README.md:ro

      # Mount sibling packages (read-only)
      - ../../../gtimes:/opt/gtimes:ro
      - ../../../gps_parser:/opt/gps_parser:ro

      # Mount config data (read-only)
      - ../../../gps-config-data:/opt/gps-config-data:ro

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 512M

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    # Command - start scheduler with all stations
    command: ["scheduler", "start", "--verbose", "--show-jobs"]

volumes:
  gps-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /tmp/gpsdata

  gps-cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/cache/gps_receivers
