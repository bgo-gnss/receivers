version: '3.8'

# GPS Receivers - Development Docker Compose
# Purpose: Local development and testing on laptop
# Data: /tmp/gpsdata/ (ephemeral, shared between Docker and manual commands)

services:
  gps-scheduler:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    image: gps-receivers-dev:latest
    container_name: gps-receivers-scheduler-dev
    hostname: gps-scheduler-dev
    restart: unless-stopped

    # Network mode - use host for simplicity in dev
    network_mode: host

    # Environment variables
    environment:
      - GPS_CONFIG_REPO_URL=https://git.vedur.is/bgo/gps-config-data.git
      - GPS_ENVIRONMENT=docker-dev
      - GPS_CONFIG_PATH=/opt/gps-config-data
      - PYTHONUNBUFFERED=1
      - TZ=Atlantic/Reykjavik

    # Volumes for persistence
    volumes:
      # Data directory - 1:1 bind mount (no path translation!)
      # Both Docker and laptop manual commands write to /tmp/gpsdata/
      - /tmp/gpsdata:/tmp/gpsdata

      # Cache and logs - using Docker volumes for isolation
      - gps-cache:/var/cache/gps_receivers

      # Mount gps-config-data from host for easy development
      - ../../../gps-config-data:/opt/gps-config-data:ro

      # Mount source code for live development
      - ../../src:/opt/receivers/src:ro
      - ../../pyproject.toml:/opt/receivers/pyproject.toml:ro

      # Mount gtimes and gps_parser for development
      - ../../../gtimes:/opt/gtimes:ro
      - ../../../gps_parser:/opt/gps_parser:ro

    # Resource limits (generous for dev/testing)
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 512M

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Command - start scheduler with verbose output
    command: ["scheduler", "start", "--verbose", "--show-jobs"]

  grafana:
    image: grafana/grafana:12.3.1
    container_name: gps-grafana-dev
    restart: unless-stopped
    network_mode: host
    environment:
      - GF_SERVER_HTTP_PORT=3001
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DATASOURCE_USER=${GF_DATASOURCE_USER:-bgo}
      - GF_DATASOURCE_PASSWORD=${GF_DATASOURCE_PASSWORD:-gps_health}
      - GF_PANELS_DISABLE_SANITIZE_HTML=true
    volumes:
      - ../../docs/grafana/provisioning/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ../../docs/grafana/gps_health_dashboard.json:/etc/grafana/provisioning/dashboards/json/gps_health_dashboard.json:ro
      - ../../docs/grafana/gps_station_detail_dashboard.json:/etc/grafana/provisioning/dashboards/json/gps_station_detail_dashboard.json:ro
      - ../../docs/grafana/gps_map_dashboard.json:/etc/grafana/provisioning/dashboards/json/gps_map_dashboard.json:ro
      - ../../docs/grafana/gps_data_delivery_dashboard.json:/etc/grafana/provisioning/dashboards/json/gps_data_delivery_dashboard.json:ro
      - ../../docs/grafana/provisioning/datasources/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana-data:/var/lib/grafana

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # timescaledb-test — sidecar Postgres for migration dry-runs
  # ---------------------------------------------------------------------------
  # Purpose: a clean, isolated Postgres with the TimescaleDB extension preloaded,
  # so the 048_unified_snapshot_schema migration (and future TS-dependent work)
  # can be exercised end-to-end without touching the laptop's gps_health DB.
  #
  # Image:   timescale/timescaledb:latest-pg17 (PG 17 + TimescaleDB Community)
  #          — matches pgdev.vedur.is's PostgreSQL 17.7.
  #
  # Port:    5433 on the host (laptop's main PG keeps 5432).
  #
  # Profile: "migration-test" — does NOT auto-start with `docker compose up`.
  #          Bring it up explicitly:
  #            docker compose --profile migration-test up -d timescaledb-test
  #
  # Apply migration 048 + rollback dry-run:
  #   psql -h localhost -p 5433 -U bgo -d gps_health_test \
  #        -f migrations/001_block_aligned_schema.sql        # parent stations table
  #   psql -h localhost -p 5433 -U bgo -d gps_health_test \
  #        -f migrations/048_unified_snapshot_schema.sql     # the new schema
  #   psql -h localhost -p 5433 -U bgo -d gps_health_test \
  #        -f migrations/048_unified_snapshot_schema_rollback.sql
  #   psql -h localhost -p 5433 -U bgo -d gps_health_test \
  #        -f migrations/048_unified_snapshot_schema.sql     # idempotence check
  #
  # Reset the test DB:
  #   docker compose --profile migration-test down -v timescaledb-test
  #
  # Connect from psql:
  #   PGPASSWORD=gps_health_test psql -h localhost -p 5433 -U bgo -d gps_health_test
  # ---------------------------------------------------------------------------
  timescaledb-test:
    image: timescale/timescaledb:latest-pg17
    container_name: gps-timescaledb-test
    profiles: ["migration-test"]
    restart: "no"

    # network_mode: host avoids docker-proxy port-forwarding (which intermittently
    # fails to route connections through on this laptop's bridge setup). Postgres
    # then binds directly to port 5433 on the host's network namespace, which
    # also matches how gps-grafana-dev (host-net) reaches it.
    network_mode: host

    environment:
      - POSTGRES_DB=gps_health_test
      - POSTGRES_USER=bgo
      - POSTGRES_PASSWORD=gps_health_test
      - PGDATA=/var/lib/postgresql/data/pgdata
      - PGPORT=5433   # not 5432 — leaves the laptop's main PG on 5432 alone
      # TimescaleDB tuning hint — light defaults for laptop use
      - TS_TUNE_MAX_CONNS=50
      - TS_TUNE_MEMORY=2GB

    volumes:
      - timescaledb-test-data:/var/lib/postgresql/data
      # Mount the migrations folder read-only at /migrations so they can be
      # applied without copying files: `psql ... -f /migrations/048_*.sql`
      # from inside the container, or `-f migrations/048_*.sql` from the host.
      - ../../migrations:/migrations:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bgo -d gps_health_test"]
      interval: 5s
      timeout: 3s
      retries: 12      # ~1 minute window for first-boot TimescaleDB init

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  grafana-data:

  # Persistent storage for the dry-run TimescaleDB — survives `docker compose
  # down` but is wiped by `docker compose down -v`. Keep it across iterations
  # so you don't redo CREATE EXTENSION + initial pg setup every restart.
  timescaledb-test-data:

  # Cache volume - separate from host for Docker isolation
  gps-cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /tmp/gps_receivers_cache

# Notes:
# ------
# 1. Data directory (/tmp/gpsdata/) is 1:1 bind mounted
#    - Docker writes: /tmp/gpsdata/ (inside container)
#    - Appears at: /tmp/gpsdata/ (on host)
#    - Manual commands write: /tmp/gpsdata/ (on host)
#    - Result: Both see same files, no confusion!
#
# 2. Cache is isolated to avoid conflicts with manual runs
#    - Docker: /var/cache/gps_receivers/ → /tmp/gps_receivers_cache/
#    - Manual: ~/.cache/gps_receivers/
#
# 3. Source code is mounted read-only for development
#    - Changes to Python code require container rebuild
#    - For faster iteration, can mount rw and pip install -e
#
# 4. Configuration is deployed inside container to /etc/gpsconfig/
#    - Uses docker-dev.env environment file
#    - Entrypoint.sh handles deployment during startup
