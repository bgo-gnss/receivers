apiVersion: 1
datasources:
  - name: gps_health
    type: grafana-postgresql-datasource
    access: proxy
    url: ${GF_DATASOURCE_HOST:-localhost}:${GF_DATASOURCE_PORT:-5432}
    database: ${GF_DATASOURCE_DB:-gps_health}
    user: ${GF_DATASOURCE_USER:-grafana_reader}
    secureJsonData:
      password: ${GF_DATASOURCE_PASSWORD:-}
    jsonData:
      sslmode: disable
      postgresVersion: 1400
    isDefault: true
    editable: true
