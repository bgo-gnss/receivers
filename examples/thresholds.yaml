# GPS Receiver Health Monitoring Thresholds — per-receiver-type overrides
#
# Default thresholds live in database.cfg. This file is only needed for
# receiver-type-specific overrides that differ from the defaults.
#
# Copy to ~/.config/gpsconfig/thresholds.yaml (or $GPS_CONFIG_PATH/)
#
# Loading priority:
#   1. ThresholdConfig dataclass defaults (fallback)
#   2. database.cfg threshold sections (primary config)
#   3. database.cfg power-type voltage ([voltage_dcdc], [voltage_mains])
#   4. This file: receiver_types overrides (per-receiver)
#
# All values are optional — only set what differs from database.cfg.

receiver_types:
  # Trimble NetR9 — often powered via 24V DC or PoE;
  # P1 voltage from merge.xml can legitimately read 18-26V.
  NetR9:
    voltage:
      warning_high: 28.0
      critical_high: 30.0

  # NetR5 same power characteristics as NetR9
  NetR5:
    voltage:
      warning_high: 28.0
      critical_high: 30.0

  # NetRS — older Trimble, 12V range (same as battery default)
  NetRS:
    voltage:
      warning_high: 15.0
      critical_high: 16.0

  # Septentrio PolaRX5 — can handle higher temperatures
  # PolaRX5:
  #   temperature:
  #     critical_high: 70.0
